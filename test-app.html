<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Test</title>
</head>
<body>
    <h1>Testing App Loading</h1>
    <iframe src="http://localhost:5000" width="100%" height="600" style="border: 1px solid #ccc;"></iframe>
    
    <script>
        // Test API endpoints
        fetch('http://localhost:5000/api/health')
            .then(r => r.json())
            .then(data => {
                console.log('API Health:', data);
                document.body.innerHTML += `<p>API Health: ${JSON.stringify(data)}</p>`;
            })
            .catch(e => {
                console.error('API Error:', e);
                document.body.innerHTML += `<p>API Error: ${e.message}</p>`;
            });
    </script>
</body>
</html>
