<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#101828"/><stop offset="1" stop-color="#164e63"/></linearGradient><style>text{font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif}.title{font-size:54px;font-weight:800;fill:#fff}.sub{font-size:25px;fill:#bae6fd}.panel{fill:#ffffff;rx:30}.left{stroke:#ffb703;stroke-width:5}.right{stroke:#2ec4b6;stroke-width:5}.h{font-size:38px;font-weight:800;fill:#102a43}.item{font-size:27px;fill:#243b53}.note{font-size:24px;fill:#486581}.center{fill:#0b3954;stroke:#fff;stroke-width:4;rx:28}.centerText{font-size:31px;font-weight:800;fill:#fff}.warn{font-size:25px;font-weight:800;fill:#ffb703}</style></defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="80" y="92" class="title">人和 AI 的分工：不是替代，而是升级岗位能力</text><text x="82" y="135" class="sub">AI 负责重复、检索、执行流程；人负责规则、边界、例外和责任</text>
  <rect x="90" y="210" width="610" height="520" class="panel left"/><text x="140" y="285" class="h">人负责什么</text><text x="140" y="360" class="item">1. 定义业务规则和排查流程</text><text x="140" y="420" class="item">2. 判断高风险操作和例外情况</text><text x="140" y="480" class="item">3. 确认权限、数据范围和责任边界</text><text x="140" y="540" class="item">4. 解释现实经营事件：撤货、纠纷、停业</text><text x="140" y="600" class="item">5. 审核 AI 输出，决定最终处理动作</text><text x="140" y="670" class="note">运维/财务/业务人员会从“手工查问题”</text><text x="140" y="705" class="note">转为“流程设计者和结果审核者”。</text>
  <rect x="900" y="210" width="610" height="520" class="panel right"/><text x="950" y="285" class="h">AI 负责什么</text><text x="950" y="360" class="item">1. 检索历史案例、文档、代码和表结构</text><text x="950" y="420" class="item">2. 执行固定 SQL 模板和诊断步骤</text><text x="950" y="480" class="item">3. 归类问题，生成业务可读解释</text><text x="950" y="540" class="item">4. 发现重复问题，建议沉淀为规则</text><text x="950" y="600" class="item">5. 生成日报、周报、报告和处理说明</text><text x="950" y="670" class="note">AI 不能自由改生产数据，不能替人承担</text><text x="950" y="705" class="note">财务、权限和业务决策责任。</text>
  <rect x="565" y="375" width="470" height="150" class="center"/><text x="618" y="435" class="centerText">正确关系</text><text x="615" y="485" class="centerText">人设规则，AI 跑流程</text>
  <text x="355" y="805" class="warn">底线：高风险写操作、敏感数据、财务结论、业务决策必须有人确认</text>
</svg>
