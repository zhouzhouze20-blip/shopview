<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f8fbff"/><stop offset="1" stop-color="#dff7f4"/></linearGradient><style>text{font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif}.title{font-size:52px;font-weight:800;fill:#102a43}.sub{font-size:25px;fill:#486581}.box{fill:#fff;stroke:#2ec4b6;stroke-width:3;rx:24}.h{font-size:30px;font-weight:800;fill:#0b3954}.p{font-size:23px;fill:#334e68}.old{fill:#fff3e0;stroke:#fb8500;stroke-width:3;rx:24}.new{fill:#e6fffa;stroke:#00a896;stroke-width:3;rx:24}.arrow{stroke:#1d3557;stroke-width:8;fill:none;marker-end:url(#arrow)}.bad{font-size:24px;font-weight:700;fill:#d62828}.good{font-size:24px;font-weight:700;fill:#007f5f}.foot{font-size:25px;font-weight:800;fill:#102a43}</style><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#1d3557"/></marker></defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="80" y="90" class="title">日常问题处理：从“口头经验”变成“可检索资产”</text><text x="82" y="132" class="sub">每一次服务器检查、数据库排查、业务问题处理，都要留下可复用记录</text>
  <rect x="90" y="210" width="640" height="470" class="old"/><text x="130" y="270" class="bad">过去的处理方式</text><text x="130" y="330" class="h">业务报问题</text><path d="M315 355 L315 405" class="arrow"/><text x="130" y="455" class="h">人工查服务器 / 数据库 / ERP</text><path d="M315 480 L315 530" class="arrow"/><text x="130" y="580" class="h">口头解决，经验容易丢失</text><text x="130" y="635" class="p">结果：下次同类问题又从头查，</text><text x="130" y="670" class="p">新人不知道历史原因和处理边界。</text>
  <rect x="870" y="210" width="640" height="470" class="new"/><text x="910" y="270" class="good">现在要形成的方式</text><text x="910" y="330" class="h">业务报问题，Codex 辅助整理现象</text><path d="M1185 355 L1185 405" class="arrow"/><text x="910" y="455" class="h">联查代码 / 表结构 / 存储过程 / 日志</text><path d="M1185 480 L1185 530" class="arrow"/><text x="910" y="580" class="h">沉淀为案例、SQL、流程和知识库</text><text x="910" y="635" class="p">结果：同类问题可检索、可复用，</text><text x="910" y="670" class="p">逐步转成诊断流程和预警规则。</text>
  <rect x="250" y="750" width="1100" height="70" fill="#102a43" rx="22"/><text x="310" y="796" class="foot" fill="#fff">每天必须留下：问题现象、影响范围、排查步骤、查询 SQL、最终原因、可复用经验</text>
</svg>
