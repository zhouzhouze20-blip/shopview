<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fffdf7"/><stop offset="1" stop-color="#e0f2fe"/></linearGradient><style>text{font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif}.title{font-size:52px;font-weight:800;fill:#102a43}.sub{font-size:25px;fill:#486581}.stage{fill:#fff;stroke:#0284c7;stroke-width:3;rx:26}.h{font-size:30px;font-weight:800;fill:#0b3954}.p{font-size:22px;fill:#334e68}.arrow{stroke:#fb8500;stroke-width:8;fill:none;marker-end:url(#arrow)}.tag{fill:#023047;rx:20}.tagtext{font-size:25px;font-weight:800;fill:#fff}.case{fill:#fffbeb;stroke:#f59e0b;stroke-width:3;rx:22}.caseText{font-size:24px;fill:#451a03}.warn{font-size:24px;font-weight:800;fill:#dc2626}</style><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#fb8500"/></marker></defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="80" y="90" class="title">从 AI 诊断到主动预警，再到场景 Agent</text><text x="82" y="132" class="sub">先把一个问题做成可靠诊断，再让系统主动发现，最后包装成岗位或场景助手</text>
  <rect x="80" y="210" width="280" height="300" class="stage"/><text x="112" y="275" class="h">1. 人工诊断</text><text x="112" y="335" class="p">人在页面点击诊断：</text><text x="112" y="372" class="p">卡券凭证差异、</text><text x="112" y="409" class="p">柜位收益异常、</text><text x="112" y="446" class="p">开业配置缺失。</text>
  <rect x="450" y="210" width="280" height="300" class="stage"/><text x="482" y="275" class="h">2. 固定流程</text><text x="482" y="335" class="p">沉淀排查步骤：</text><text x="482" y="372" class="p">查哪些表、</text><text x="482" y="409" class="p">跑哪些 SQL、</text><text x="482" y="446" class="p">按什么模板输出。</text>
  <rect x="820" y="210" width="280" height="300" class="stage"/><text x="852" y="275" class="h">3. 主动预警</text><text x="852" y="335" class="p">系统每天自动跑：</text><text x="852" y="372" class="p">差异超过阈值、</text><text x="852" y="409" class="p">合同即将到期、</text><text x="852" y="446" class="p">ETL 延迟失败。</text>
  <rect x="1190" y="210" width="280" height="300" class="stage"/><text x="1222" y="275" class="h">4. 场景 Agent</text><text x="1222" y="335" class="p">按场景整合能力：</text><text x="1222" y="372" class="p">财务诊断、</text><text x="1222" y="409" class="p">运维排查、</text><text x="1222" y="446" class="p">开业筹备。</text>
  <path d="M370 360 L440 360" class="arrow"/><path d="M740 360 L810 360" class="arrow"/><path d="M1110 360 L1180 360" class="arrow"/>
  <rect x="170" y="595" width="1260" height="170" class="case"/><text x="215" y="650" class="caseText">例子：卡券凭证匹配异常</text><text x="215" y="696" class="caseText">人工诊断跑通后，系统每天自动检查差异金额和强匹配率；异常时 AI 解释可能原因，生成待办，推送财务或信息部。</text><text x="215" y="742" class="warn">原则：规则发现问题，AI 解释问题；历史案例只作参考，当前结论必须用当前数据验证。</text>
  <rect x="395" y="805" width="810" height="58" class="tag"/><text x="430" y="843" class="tagtext">不要先追求“大而全 Agent”，先把高频场景做准、做稳、可审计</text>
</svg>
