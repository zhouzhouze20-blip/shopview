version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: counter-management-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: counter_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-counter-db.sql:/docker-entrypoint-initdb.d/init-counter-db.sql:ro
    ports:
      - "15433:5432"
    networks:
      - counter-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d counter_management"]
      interval: 30s
      timeout: 5s
      retries: 5

  # Python FastAPI Application
  python-app:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: counter-management-python-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres123}@postgres:5432/counter_management
      DEBUG: "false"
      PORT: 8000
    ports:
      - "18001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - counter-network
    volumes:
      - app_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy for Python App
  nginx-python:
    image: nginx:alpine
    container_name: counter-management-nginx-python
    restart: unless-stopped
    ports:
      - "18081:80"
      - "18444:443"
    volumes:
      - ./nginx-python.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - python-app
    networks:
      - counter-network

volumes:
  postgres_data:
    driver: local
  app_logs:
    driver: local

networks:
  counter-network:
    driver: bridge