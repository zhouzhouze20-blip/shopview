version: "3.8"

services:
  shopview-app:
    build:
      context: .
      dockerfile: Dockerfile.linux
    container_name: shopview-app
    restart: unless-stopped
    user: ${APP_RUN_USER:-0:0}
    environment:
      NODE_ENV: production
      PORT: 7000
      DEBUG: "false"
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-4}
      DATABASE_URL: ${DATABASE_URL:-postgresql://sales_user:sales_password_2024@192.168.98.80:5432/sales_db}
      PGHOST: ${PGHOST:-192.168.98.80}
      PGPORT: ${PGPORT:-5432}
      PGUSER: ${PGUSER:-sales_user}
      PGPASSWORD: ${PGPASSWORD:-sales_password_2024}
      PGDATABASE: ${PGDATABASE:-sales_db}
      TZ: ${TZ:-Asia/Shanghai}
      SECRET_KEY: ${SECRET_KEY:-change-me}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-too}
      UPLOAD_PATH: ${UPLOAD_PATH:-/app/uploads}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_PATH: ${LOG_PATH:-/app/logs}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      WECOM_ENABLED: ${WECOM_ENABLED:-false}
      WECOM_CORP_ID: ${WECOM_CORP_ID:-}
      WECOM_AGENT_ID: ${WECOM_AGENT_ID:-}
      WECOM_APP_SECRET: ${WECOM_APP_SECRET:-}
      WECOM_REDIRECT_BASE_URL: ${WECOM_REDIRECT_BASE_URL:-}
      WECOM_FRONTEND_BASE_URL: ${WECOM_FRONTEND_BASE_URL:-}
    ports:
      - "${APP_PORT:-7000}:7000"
    volumes:
      - ${UPLOAD_HOST_PATH:-./uploads}:${UPLOAD_PATH:-/app/uploads}:Z
      - ${LOG_HOST_PATH:-./logs}:${LOG_PATH:-/app/logs}:Z
      - ./config:/app/config:ro
    networks:
      - shopview-network
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:7000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: shopview-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - shopview-app
    networks:
      - shopview-network

volumes:
  nginx_logs:
    driver: local

networks:
  shopview-network:
    driver: bridge
