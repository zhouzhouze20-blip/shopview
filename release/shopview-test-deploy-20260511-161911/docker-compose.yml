services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_EXTRA_INDEX_URL: ${PIP_EXTRA_INDEX_URL:-}
    container_name: ${APP_CONTAINER_NAME:-shopview-test-app}
    restart: unless-stopped
    user: ${APP_RUN_USER:-0:0}
    env_file:
      - .env
    ports:
      - "${APP_PORT}:${PORT}"
    volumes:
      - ${UPLOAD_HOST_PATH:-./uploads}:${UPLOAD_PATH}:Z
      - ${LOG_HOST_PATH:-./logs}:${LOG_PATH}:Z
