services:
  electronic-archive:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:22-bookworm-slim}
    image: electronic-archive-workbench:latest
    container_name: electronic-archive-workbench
    restart: unless-stopped
    ports:
      - "3020:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
